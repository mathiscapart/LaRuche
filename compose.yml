# Stack honeypot LaRuche.
# Les honeypots écrivent leurs événements en JSON Lines sur un volume commun
# (honeypot_logs) ; Fluent Bit (US-17) les centralise et les forwarde vers
# OpenObserve (US-19) — pas de SIEM, pas de broker intermédiaire.
#
# Ségmentation réseau (US-21) :
#   - honeypot-front  (bridge)         : surface d'exposition — honeypots,
#                                        attacker, analyzer (besoin d'accès
#                                        sortant pour l'enrichissement).
#   - honeypot-backend (internal:true) : pipeline de collecte / stockage —
#                                        fluent-bit, openobserve, provisioner.
# Aucun réseau partagé entre un honeypot et OpenObserve : un conteneur honeypot
# compromis ne peut donc pas atteindre les données collectées par le réseau.
# Durcissement appliqué à TOUS les conteneurs : no-new-privileges, read_only
# (+ tmpfs pour les chemins réellement inscriptibles) et limites de ressources.
services:
  attacker:
    build:
      context: attacker
    image: qualite863/attacker:latest
    container_name: attacker
    volumes:
      - ./attacker:/app/attacker
    networks:
      - honeypot-front
    # Durcissement (US-21) : pas de privilèges, racine en lecture seule.
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
          pids: 256

  honeypot-ssh:
    build: ./honeypots/ssh
    image: qualite863/honeypot-ssh:latest
    container_name: honeypot-ssh
    restart: unless-stopped
    # Deux ports ouverts : 22 (SSH standard, crédibilité) et 2222 (cible des
    # scripts d'attaque US-27 / DMZ US-20). Les deux pointent vers le honeypot
    # qui écoute en interne sur 2222 (port non privilégié -> process non-root).
    ports:
      - "22:2222"
      - "2222:2222"
    environment:
      SSH_BIND_HOST: "0.0.0.0"
      SSH_BIND_PORT: "2222"
      SSH_HOSTNAME: "prod-srv-01"
      # Comptes faibles acceptés (US-03). root est toujours refusé par le code.
      SSH_ALLOWED_CREDENTIALS: "admin:admin123,admin:P@ssw0rd,ubuntu:ubuntu,user:123456,deploy:deploy2023"
      SSH_TARPIT_SECONDS: "2.5"
      SSH_LOG_FILE: "/var/log/honeypot/ssh.jsonl"
    # Volume commun : le honeypot y écrit ses logs JSONL (RW).
    volumes:
      - honeypot_logs:/var/log/honeypot
    # Surface d'exposition uniquement : aucun accès au réseau backend.
    networks:
      - honeypot-front
    # Durcissement (US-21) : pas de privilèges, racine en lecture seule.
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
          pids: 200

  honeypot-ftp:
    build: ./honeypots/ftp
    image: qualite863/honeypot-ftp:latest
    container_name: honeypot-ftp
    restart: unless-stopped
    # Port de contrôle exposé sur 21 (FTP standard, crédibilité) et 2121
    # (cible des scripts d'attaque). Le honeypot écoute en interne sur 2121
    # (port non privilégié -> process non-root).
    ports:
      - "21:2121"
      - "2121:2121"
      # Plage de ports passifs (mode PASV) : indispensable pour que LIST / RETR
      # aboutissent. Doit correspondre à FTP_PASV_MIN..MAX.
      - "30000-30009:30000-30009"
    environment:
      FTP_BIND_HOST: "0.0.0.0"
      FTP_BIND_PORT: "2121"
      FTP_HOSTNAME: "prod-srv-01"
      FTP_BANNER: "(vsFTPd 3.0.3)"
      # Comptes faibles acceptés. root est toujours refusé par le code.
      FTP_ALLOWED_CREDENTIALS: "admin:admin123,ftp:ftp,backup:Backup2024,deploy:deploy2023"
      # Identifiants du honeypot SSH, acceptés AUSSI ici pour capturer leur
      # réutilisation SSH->FTP (tag ssh_credential_reuse, mouvement latéral).
      # À garder synchronisé avec SSH_ALLOWED_CREDENTIALS du service honeypot-ssh.
      FTP_SSH_CREDENTIALS: "admin:admin123,admin:P@ssw0rd,ubuntu:ubuntu,user:123456,deploy:deploy2023"
      # Accès anonyme autorisé : maximise la capture de la reconnaissance.
      FTP_ANONYMOUS: "true"
      FTP_DECOY_ROOT: "/srv/ftp"
      FTP_PASV_MIN: "30000"
      #FTP_MASQUERADE_ADDRESS: "127.0.0.1"
      FTP_PASV_MAX: "30009"
      # IP publique à annoncer en mode passif derrière un NAT/Docker, à régler
      # selon l'hôte/la DMZ (sinon l'adresse locale de la connexion est utilisée).
      # FTP_MASQUERADE_ADDRESS: "203.0.113.10"
      FTP_LOG_FILE: "/var/log/honeypot/ftp.jsonl"
    # Volume commun : le honeypot y écrit ses logs JSONL (RW).
    volumes:
      - honeypot_logs:/var/log/honeypot
      # Arborescence leurre rematérialisée au démarrage. Volume nommé (et non
      # tmpfs) car le process tourne en non-root (uid 10001) : un volume hérite
      # de l'ownership `honey` de l'image, ce qu'un tmpfs root-owned ne permet
      # pas (os.utime échoue alors avec EPERM sous read_only).
      - ftp_decoy:/srv/ftp
    # Surface d'exposition uniquement : aucun accès au réseau backend.
    networks:
      - honeypot-front
    # Durcissement (US-21) : pas de privilèges, racine en lecture seule.
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
          pids: 200

  # Honeypot HTTP (EPIC-2) : émulation WordPress.
  honeypot-http:
    build: ./honeypots/http
    image: qualite863/honeypot-http:latest
    container_name: honeypot-http
    restart: unless-stopped
    # 80 (HTTP standard, crédibilité) et 8080 (cible des scripts d'attaque).
    # Le honeypot écoute en interne sur 8080 (port non privilégié -> non-root).
    ports:
      - "80:8080"
      - "8080:8080"
    environment:
      HONEYPOT_HOST: "prod-srv-01"
      HTTP_LOG_FILE: "/var/log/honeypot/http.jsonl"
      # Comptes faibles acceptés par le faux login WordPress (US-09 / hardening).
      WP_ALLOWED_CREDENTIALS: "admin:admin,admin:admin123,administrator:password123"
    # Volume commun : le honeypot y écrit ses logs JSONL (RW).
    volumes:
      - honeypot_logs:/var/log/honeypot
    # Surface d'exposition uniquement : aucun accès au réseau backend.
    networks:
      - honeypot-front
    # Durcissement (US-21) : pas de privilèges, racine en lecture seule.
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
          pids: 200

  # US-17 : centralisation des logs via Fluent Bit.
  fluent-bit:
    image: fluent/fluent-bit:3.1.9
    container_name: fluent-bit
    restart: unless-stopped
    depends_on:
      - honeypot-ssh
      - honeypot-ftp
      - honeypot-http
      - openobserve
      - analyzer
    environment:
      # Identifiants d'ingestion OpenObserve (US-19), injectés dans la conf via ${...}.
      OPENOBSERVE_USER: "${OPENOBSERVE_USER:-admin@laruche.local}"
      OPENOBSERVE_PASSWORD: "${OPENOBSERVE_PASSWORD:-Honeypot2026!}"
    volumes:
      # Logs honeypot en LECTURE SEULE (le collecteur ne doit pas y écrire).
      - honeypot_logs:/var/log/honeypot:ro
      # :z = relabel SELinux (Fedora) sinon le conteneur ne peut pas lire la config.
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro,z
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro,z
      # Suivi des offsets de tail (volume inscriptible dédié).
      - fluentbit_state:/var/lib/fluent-bit/state
    # Endpoint santé/métriques interne de Fluent Bit.
    ports:
      - "2020:2020"
    # Pipeline de collecte : forwarde vers OpenObserve par le réseau backend.
    networks:
      - honeypot-backend
    # Durcissement (US-21) : pas de privilèges, racine en lecture seule.
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
          pids: 200

  # US-19 : stockage + exploration des événements (dashboards research, pas de SIEM).
  openobserve:
    # Épinglé par digest pour la reproductibilité (US-26).
    image: public.ecr.aws/zinclabs/openobserve@sha256:05deec62c1b643a87c31cf7f1ebeb9d4f1a4a69b012fc78464c2e00a37e17570
    container_name: openobserve
    restart: unless-stopped
    environment:
      ZO_ROOT_USER_EMAIL: "${OPENOBSERVE_USER:-admin@laruche.local}"
      ZO_ROOT_USER_PASSWORD: "${OPENOBSERVE_PASSWORD:-Honeypot2026!}"
      ZO_DATA_DIR: "/data"
    # Accès aux dashboards depuis l'hôte, restreint à la loopback (esprit DMZ
    # US-20). Docker ne publie PAS les ports d'un conteneur uniquement attaché
    # à un réseau `internal` -> openobserve est aussi sur `dashboard-edge`.
    ports:
      - "127.0.0.1:5080:5080"
    volumes:
      - openobserve_data:/data
    # Stockage des données collectées : réseau backend interne (fluent-bit /
    # provisioner) + dashboard-edge (publication du port hôte uniquement).
    # Les honeypots ne sont sur aucun de ces deux réseaux -> inatteignable
    # depuis un conteneur honeypot compromis.
    networks:
      - honeypot-backend
      - dashboard-edge
    # Durcissement (US-21) : pas de privilèges, racine en lecture seule.
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 1G
          pids: 1024

  # US-19 : provisioning automatique des dashboards OpenObserve au démarrage.
  # Conteneur éphémère : attend qu'OpenObserve réponde, (ré)importe les
  # dashboards/*.json de façon idempotente, puis s'arrête.
  dashboard-provisioner:
    image: python:3.12-slim-bookworm
    container_name: dashboard-provisioner
    depends_on:
      - openobserve
    environment:
      OPENOBSERVE_URL: "http://openobserve:5080"
      OPENOBSERVE_USER: "${OPENOBSERVE_USER:-admin@laruche.local}"
      OPENOBSERVE_PASSWORD: "${OPENOBSERVE_PASSWORD:-Honeypot2026!}"
      DASHBOARDS_DIR: "/provision/dashboards"
    volumes:
      # :ro,z = lecture seule + relabel SELinux (Fedora).
      - ./openobserve:/provision:ro,z
    command: ["python", "/provision/provision.py"]
    # Tâche one-shot : pas de redémarrage en boucle une fois l'import fait.
    restart: "no"
    # Joint OpenObserve sur le réseau backend pour pousser les dashboards.
    networks:
      - honeypot-backend
    # Durcissement (US-21) : pas de privilèges, racine en lecture seule.
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
          pids: 200

  # Analyzer (EPIC-4) : enrichit les events (GeoIP / AbuseIPDB / GreyNoise) +
  # profil comportemental, et écrit les events enrichis pour Fluent Bit -> OpenObserve.
  analyzer:
    build:
      context: .
      dockerfile: analyzer/Dockerfile
    image: qualite863/analyzer:latest
    container_name: analyzer
    restart: unless-stopped
    depends_on:
      - honeypot-ssh
      - honeypot-ftp
      - honeypot-http
    environment:
      ANALYZER_LOG_DIR: "/var/log/honeypot"
      ANALYZER_ENRICHED_OUTPUT: "/var/log/honeypot/enriched/events.jsonl"
      ANALYZER_INTERVAL: "10"
      # Clés API fournies par l'école (vides => enrichissement neutre, sans appel réseau).
      ABUSEIPDB_API_KEY: "${ABUSEIPDB_API_KEY:-}"
      GREYNOISE_API_KEY: "${GREYNOISE_API_KEY:-}"
      GEOIP_CITY_DB: "/data/geoip/GeoLite2-City.mmdb"
      GEOIP_ASN_DB: "/data/geoip/GeoLite2-ASN.mmdb"
    volumes:
      # Lit le JSONL brut et écrit l'enrichi dans le même volume (sous enriched/).
      - honeypot_logs:/var/log/honeypot
      # Bases MaxMind GeoLite2 à fournir (sinon GeoIP renvoie des champs vides).
      - ./data/geoip:/data/geoip:ro
      # Cache SQLite AbuseIPDB / GreyNoise (/app/.cache). Volume nommé pour
      # rester inscriptible par l'uid non-root sous read_only (cf. honeypot-ftp).
      - analyzer_cache:/app/.cache
    # Front : besoin d'un accès sortant pour les API d'enrichissement
    # (AbuseIPDB / GreyNoise). N'accède jamais à OpenObserve par le réseau.
    networks:
      - honeypot-front
    # Durcissement (US-21) : pas de privilèges, racine en lecture seule.
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
          pids: 256

volumes:
  honeypot_logs:
  fluentbit_state:
  openobserve_data:
  # Chemins inscriptibles isolés sous read_only (US-21), ownership non-root.
  ftp_decoy:
  analyzer_cache:

# Ségmentation réseau (US-21).
networks:
  # Surface exposée : honeypots, attacker, analyzer.
  honeypot-front:
    driver: bridge
  # Pipeline de collecte/stockage isolé du monde extérieur (pas de route
  # sortante) : fluent-bit, openobserve, dashboard-provisioner.
  honeypot-backend:
    internal: true
  # Réseau bridge minimal dédié à la SEULE publication du port dashboard
  # d'OpenObserve vers l'hôte (impossible depuis un réseau `internal`).
  # Aucun honeypot n'y est attaché : la segmentation reste intacte.
  dashboard-edge:
    driver: bridge
