[pytest]
# Configuration for pytest to work with the honeypots

# Add honeypots directory to Python path
pythonpath = honeypots

# Test patterns
testpaths = honeypots

# Verbose output
addopts = -v

# Continue on first failure (useful for CI)
# addopts = --continue-on-failure

# Python files pattern
python_files = test_*.py

# Functions pattern
python_functions = test_*

# Classes pattern
python_classes = Test*
