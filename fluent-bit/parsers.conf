# Parsers Fluent Bit — honeypot LaRuche (US-17).

# Chaque ligne des fichiers honeypot est un objet JSON conforme à
# docs/event.schema.json. Le parser conserve la structure imbriquée
# (payload, classification, enrichment) telle quelle.
[PARSER]
    Name        honeypot_json
    Format      json
    # Timestamp ISO 8601 UTC avec millisecondes, ex: 2026-06-09T12:59:31.155Z
    Time_Key    timestamp
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    # On garde aussi le champ timestamp d'origine dans l'enregistrement
    # (le suffixe Z n'est pas toujours parsé, on évite toute perte).
    Time_Keep   On
