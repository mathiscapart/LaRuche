# Fluent Bit — transport des logs honeypot ENRICHIS (US-17, EPIC-4).
#
# Pipeline (pas de SIEM, pas de broker) :
#   honeypots -> JSONL bruts -> [analyzer : enrichissement] -> enriched/*.jsonl
#   -> Fluent Bit (ce fichier) -> OpenObserve (US-19).
#
# Fluent Bit tail les events DÉJÀ enrichis (bloc enrichment + classification.profile)
# produits par l'analyzer, et les forwarde vers OpenObserve.

[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

[INPUT]
    Name              tail
    # Events ENRICHIS produits par l'analyzer (et non plus le brut des honeypots).
    Path              /var/log/honeypot/enriched/*.jsonl
    Parser            honeypot_json
    Tag               honeypot.*
    # Lire l'historique présent au démarrage, puis suivre les ajouts.
    Read_from_Head    On
    Refresh_Interval  5
    # Suivi des offsets pour ne pas réémettre après redémarrage. Le volume des
    # logs étant en RO, la DB vit sur un volume d'état dédié inscriptible.
    DB                /var/lib/fluent-bit/state/tail.db
    DB.Sync           Normal
    Skip_Long_Lines   On
    Mem_Buf_Limit     16MB

# Trace l'origine sans altérer l'événement (le champ `service` reste la source
# de vérité du honeypot émetteur).
[FILTER]
    Name    record_modifier
    Match   honeypot.*
    Record  collected_by fluent-bit

# Trace de debug locale (logs Docker du collecteur).
[OUTPUT]
    Name    stdout
    Match   honeypot.*
    Format  json_lines

# OpenObserve (US-19) : ingestion via le endpoint bulk JSON, stream honeypot-events.
# OpenObserve assigne lui-même `_timestamp` à l'ingestion ; le champ `timestamp`
# d'origine reste présent dans l'événement.
[OUTPUT]
    Name        http
    Match       honeypot.*
    Host        openobserve
    Port        5080
    URI         /api/default/honeypot-events/_json
    Format      json
    HTTP_User   ${OPENOBSERVE_USER}
    HTTP_Passwd ${OPENOBSERVE_PASSWORD}
    tls         Off
