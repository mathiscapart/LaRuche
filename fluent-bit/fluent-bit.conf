# Fluent Bit — centralisation des logs honeypot (US-17, EPIC-4).
#
# Point d'entrée unique du pipeline : tail des journaux JSONL produits par les
# honeypots SSH/HTTP/FTP sur un volume partagé (monté en lecture seule ici),
# puis forward en JSON structuré vers l'aval.
#
# Aval : OpenObserve (US-19, indexation + dashboards). Pas de SIEM ni de broker.
# Pour l'instant on sort en stdout pour valider l'ingestion ; la sortie
# OpenObserve est préparée plus bas (commentée) et sera activée avec US-19.

[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

[INPUT]
    Name              tail
    # Volume commun aux 3 honeypots : ssh.jsonl, http.jsonl, ftp.jsonl
    Path              /var/log/honeypot/*.jsonl
    Parser            honeypot_json
    Tag               honeypot.*
    # Lire l'historique présent au démarrage, puis suivre les ajouts.
    Read_from_Head    On
    Refresh_Interval  5
    # Suivi des offsets pour ne pas réémettre après redémarrage. Le volume des
    # logs étant en RO, la DB vit sur un volume d'état dédié inscriptible.
    DB                /var/lib/fluent-bit/state/tail.db
    DB.Sync           Normal
    Skip_Long_Lines   On
    Mem_Buf_Limit     16MB

# Trace l'origine sans altérer l'événement (le champ `service` reste la source
# de vérité du honeypot émetteur).
[FILTER]
    Name    record_modifier
    Match   honeypot.*
    Record  collected_by fluent-bit

# Trace de debug locale (logs Docker du collecteur).
[OUTPUT]
    Name    stdout
    Match   honeypot.*
    Format  json_lines

# OpenObserve (US-19) : ingestion via le endpoint bulk JSON, stream honeypot-events.
# OpenObserve assigne lui-même `_timestamp` à l'ingestion ; le champ `timestamp`
# d'origine reste présent dans l'événement.
[OUTPUT]
    Name        http
    Match       honeypot.*
    Host        openobserve
    Port        5080
    URI         /api/default/honeypot-events/_json
    Format      json
    HTTP_User   ${OPENOBSERVE_USER}
    HTTP_Passwd ${OPENOBSERVE_PASSWORD}
    tls         Off
