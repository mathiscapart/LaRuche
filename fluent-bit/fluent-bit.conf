# Fluent Bit — centralisation des logs honeypot (US-17, EPIC-4).
#
# Point d'entrée unique du pipeline : tail des journaux JSONL produits par les
# honeypots SSH/HTTP/FTP sur un volume partagé (monté en lecture seule ici),
# puis forward en JSON structuré vers l'aval.
#
# Aval prévu : Wazuh (US-18, alertes) + OpenObserve (US-19, indexation/metrics).
# Pour l'instant on sort en stdout pour valider l'ingestion ; les sorties
# réelles sont préparées plus bas (commentées) et seront activées avec US-18/19.

[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

[INPUT]
    Name              tail
    # Volume commun aux 3 honeypots : ssh.jsonl, http.jsonl, ftp.jsonl
    Path              /var/log/honeypot/*.jsonl
    Parser            honeypot_json
    Tag               honeypot.*
    # Lire l'historique présent au démarrage, puis suivre les ajouts.
    Read_from_Head    On
    Refresh_Interval  5
    # Suivi des offsets pour ne pas réémettre après redémarrage. Le volume des
    # logs étant en RO, la DB vit sur un volume d'état dédié inscriptible.
    DB                /var/lib/fluent-bit/state/tail.db
    DB.Sync           Normal
    Skip_Long_Lines   On
    Mem_Buf_Limit     16MB

# Trace l'origine sans altérer l'événement (le champ `service` reste la source
# de vérité du honeypot émetteur).
[FILTER]
    Name    record_modifier
    Match   honeypot.*
    Record  collected_by fluent-bit

[OUTPUT]
    Name    stdout
    Match   honeypot.*
    Format  json_lines

# --- Sorties aval (à activer avec US-19 / US-18) ----------------------------
# OpenObserve (US-19) : indexation + métriques
# [OUTPUT]
#     Name       http
#     Match      honeypot.*
#     Host       openobserve
#     Port       5080
#     URI        /api/default/honeypot/_json
#     Format     json
#     Json_Date_Key    timestamp
#     Json_Date_Format iso8601
#     HTTP_User  ${OPENOBSERVE_USER}
#     HTTP_Passwd ${OPENOBSERVE_PASSWORD}
#     tls        Off
#
# Wazuh (US-18) : alertes / corrélation (via fichier lu par l'agent ou forward)
# [OUTPUT]
#     Name       forward
#     Match      honeypot.*
#     Host       wazuh
#     Port       24224
