# VirtualHost du reverse-proxy honeypot (remplace 000-default.conf).
# Les assets statiques WordPress sont servis depuis le disque par Apache (en-têtes
# authentiques) ; tout le reste (PHP dynamique émulé) est proxifié vers FastAPI.
<VirtualHost *:80>
    ServerName prod-srv-01
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html
    DirectoryIndex index.php index.html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # X-Powered-By cohérent (Title-Case), ajouté par Apache sur toutes les réponses.
    Header always set X-Powered-By "PHP/7.4.33"

    ProxyPreserveHost On
    ProxyTimeout 30

    # --- Assets statiques : servis depuis le disque (PAS proxifiés) ---
    # => vrais ETag / Last-Modified / Accept-Ranges, contenu WordPress byte-exact ;
    #    un fichier absent => vraie page 404 Apache (et non la 404 WordPress).
    ProxyPass /wp-content/      !
    ProxyPass /wp-includes/     !
    ProxyPass /wp-admin/css/    !
    ProxyPass /wp-admin/js/     !
    ProxyPass /wp-admin/images/ !
    ProxyPass /readme.html      !
    ProxyPass /license.txt      !

    # --- Tout le dynamique (WordPress émulé) -> backend FastAPI interne ---
    ProxyPass        / http://honeypot-http:8080/ retry=0
    ProxyPassReverse / http://honeypot-http:8080/
</VirtualHost>
