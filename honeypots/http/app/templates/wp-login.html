<!DOCTYPE html>
<html lang="en-US">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="referrer" content="strict-origin-when-cross-origin" />
	<title>Log In &lsaquo; My Blog &#8212; WordPress</title>
	<meta name="robots" content="max-image-preview:large, noindex, noarchive" />
	<link rel="stylesheet" id="login-css" href="/wp-admin/css/login.min.css" media="all" />
	<style>
	html { background: #f0f0f1; }
	* { box-sizing: border-box; }
	body.login {
		margin: 0; padding: 0; min-width: 0;
		color: #3c434a; background: #f0f0f1;
		font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
		font-size: 13px; line-height: 1.4em; -webkit-font-smoothing: antialiased;
	}
	#login { width: 320px; padding: 8% 0 0; margin: auto; }
	#login h1 { text-align: center; }
	#login h1 a {
		display: block; width: 84px; height: 84px; margin: 0 auto 25px;
		padding: 0; font-size: 0; line-height: 1.3; text-decoration: none; overflow: hidden;
	}
	#login h1 a .wp-logo-mark { display: block; width: 84px; height: 84px; fill: #1d2327; }
	.login form {
		margin-top: 20px; margin-left: 0; padding: 26px 24px 34px;
		font-weight: 400; overflow: hidden; background: #fff;
		border: 1px solid #c3c4c7; box-shadow: 0 1px 3px rgba(0,0,0,.04);
	}
	.login label { color: #3c434a; font-size: 14px; }
	.login form .forgetmenot label { font-size: 14px; line-height: 1.4; }
	.login form p { margin-bottom: 0; }
	.login form .input,
	.login input[type="text"],
	.login input[type="password"] {
		font-size: 24px; line-height: 1.33333333; width: 100%;
		padding: 3px 5px; margin: 2px 0 16px; min-height: 40px; max-height: none;
		border: 1px solid #8c8f94; background: #fff; color: #2c3338; border-radius: 0;
	}
	.login input:focus { border-color: #2271b1; box-shadow: 0 0 0 1px #2271b1; outline: 2px solid transparent; }
	.login .button-primary {
		float: right; background: #2271b1; border: 1px solid #2271b1; color: #fff;
		text-decoration: none; text-shadow: none; min-height: 32px; line-height: 2.30769231;
		padding: 0 12px; font-size: 13px; border-radius: 3px; cursor: pointer;
		-webkit-appearance: none; box-shadow: none;
	}
	.login .button-primary:hover { background: #135e96; border-color: #135e96; }
	.login .forgetmenot { font-weight: 400; float: left; margin-bottom: 0; }
	.login .submit { clear: both; padding: 0; margin: 0; }
	.login #nav, .login #backtoblog { font-size: 13px; padding: 0 24px 0; margin: 24px 0 0; text-align: center; }
	.login #backtoblog { margin: 12px 0 0; }
	.login #nav a, .login #backtoblog a { color: #50575e; text-decoration: none; }
	.login #nav a:hover, .login #backtoblog a:hover { color: #135e96; }
	#login_error, .login .message, .login .success {
		border-left: 4px solid #d63638; padding: 12px; margin-left: 0; margin-bottom: 20px;
		background: #fff; box-shadow: 0 1px 1px rgba(0,0,0,.04); word-wrap: break-word;
	}
	.login .message { border-left-color: #72aee6; }
	</style>
</head>
<body class="login no-js login-action-login wp-core-ui locale-en-us">
<div id="login">
	<h1 role="banner"><a href="https://wordpress.org/">
		<svg class="wp-logo-mark" viewBox="0 0 122.52 122.523" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false"><path d="M8.708 61.26c0 20.802 12.089 38.779 29.619 47.298L13.258 39.872a52.354 52.354 0 0 0-4.55 21.388zm88.032-2.652c0-6.495-2.333-10.993-4.334-14.494-2.664-4.329-5.161-7.995-5.161-12.324 0-4.831 3.665-9.328 8.825-9.328.233 0 .454.029.681.042-9.349-8.566-21.807-13.796-35.489-13.796-18.36 0-34.513 9.42-43.91 23.688 1.233.037 2.395.063 3.382.063 5.497 0 14.006-.667 14.006-.667 2.833-.166 3.167 3.994.337 4.329 0 0-2.847.335-6.015.501l19.138 56.925L60.69 49.554l-8.188-22.434c-2.83-.166-5.511-.501-5.511-.501-2.831-.166-2.5-4.495.332-4.329 0 0 8.679.667 13.843.667 5.496 0 14.006-.667 14.006-.667 2.835-.166 3.168 3.994.337 4.329 0 0-2.852.335-6.015.501l18.992 56.494 5.242-17.518c2.272-7.269 4.001-12.49 4.001-16.989zM62.184 65.857l-15.768 45.819a52.552 52.552 0 0 0 14.846 2.141c6.12 0 11.989-1.058 17.452-2.979a4.615 4.615 0 0 1-.374-.724L62.184 65.857zm45.192-29.81c.226 1.674.354 3.471.354 5.404 0 5.333-.996 11.328-3.996 18.824L87.68 106.689c15.624-9.111 26.133-26.038 26.133-45.426 0-9.137-2.333-17.729-6.437-25.215zM61.262 0C27.483 0 0 27.481 0 61.26c0 33.783 27.483 61.263 61.262 61.263 33.778 0 61.265-27.48 61.265-61.263C122.526 27.481 95.04 0 61.262 0zm0 119.715c-32.23 0-58.453-26.223-58.453-58.455 0-32.23 26.222-58.451 58.453-58.451 32.229 0 58.45 26.221 58.45 58.451 0 32.232-26.221 58.455-58.45 58.455z"/></svg>
		Powered by WordPress
	</a></h1>
	<!--LOGIN_ERROR-->
	<form name="loginform" id="loginform" action="/wp-login.php" method="post">
		<p>
			<label for="user_login">Username or Email Address</label>
			<input type="text" name="log" id="user_login" class="input" value="" size="20" autocapitalize="off" autocomplete="username" />
		</p>
		<div class="user-pass-wrap">
			<label for="user_pass">Password</label>
			<div class="wp-pwd">
				<input type="password" name="pwd" id="user_pass" class="input password-input" value="" size="20" autocomplete="current-password" spellcheck="false" />
			</div>
		</div>
		<p class="forgetmenot"><input name="rememberme" type="checkbox" id="rememberme" value="forever" /> <label for="rememberme">Remember Me</label></p>
		<p class="submit">
			<input type="submit" name="wp-submit" id="wp-submit" class="button button-primary button-large" value="Log In" />
			<input type="hidden" name="redirect_to" value="/wp-admin/" />
			<input type="hidden" name="testcookie" value="1" />
		</p>
	</form>
	<p id="nav">
		<a href="/wp-login.php?action=lostpassword">Lost your password?</a>
	</p>
	<p id="backtoblog"><a href="/">&larr; Go to My Blog</a></p>
</div>
</body>
</html>
